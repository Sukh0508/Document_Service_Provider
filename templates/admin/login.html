<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body{
            overflow:hidden;
        }

        .glass{
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(18px);
            border:1px solid rgba(255,255,255,0.15);
            box-shadow:0 10px 40px rgba(0,0,0,0.15);
        }

        .gradient-text{
            background: linear-gradient(to right,#4f46e5,#7c3aed);
            -webkit-background-clip:text;
            color:transparent;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-black relative">

    <!-- BACKGROUND -->
    <div class="absolute inset-0">

        <div class="absolute top-[-120px] left-[-120px] w-[350px] h-[350px] bg-indigo-600 rounded-full blur-3xl opacity-30"></div>

        <div class="absolute bottom-[-120px] right-[-120px] w-[350px] h-[350px] bg-purple-600 rounded-full blur-3xl opacity-30"></div>

        <!-- <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=2070')] bg-cover bg-center opacity-20"></div> -->

    </div>

    <!-- LOGIN CARD -->
    <div class="glass relative z-10 w-full max-w-md rounded-3xl p-8 mx-4">

        <!-- LOGO -->
        <div class="flex justify-center mb-6">
            <div class="w-20 h-20 rounded-2xl bg-white/10 flex items-center justify-center border border-white/20">
                <span class="text-3xl">⚡</span>
            </div>
        </div>

        <!-- TITLE -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-white">
                Welcome Back
            </h1>

              <!-- FOOTER -->
        <div class="text-center mt-6">
            <p class="text-gray-400 text-sm">
                Document Services Provider Admin Panel
            </p>
        </div>
        </div>

        <!-- FORM -->
        <form method="post">

            {% csrf_token %}

            <!-- USERNAME -->
            <div class="mb-5">
                <label class="text-sm text-gray-300 block mb-2">
                    Username
                </label>

                <input 
                    type="text"
                    name="username"
                    placeholder="Enter username"
                    class="w-full bg-white/10 border border-white/10 text-white placeholder-gray-400 px-5 py-4 rounded-2xl outline-none focus:border-indigo-500 transition"
                >
            </div>

            <!-- PASSWORD -->
            <div class="mb-6">
                <label class="text-sm text-gray-300 block mb-2">
                    Password
                </label>

                <input 
                    type="password"
                    name="password"
                    spellcheck="true"
                    placeholder="Enter password"
                    class="w-full bg-white/10 border border-white/10 text-white placeholder-gray-400 px-5 py-4 rounded-2xl outline-none focus:border-purple-500 transition"
                >
            </div>

            <!-- BUTTON -->
            <button 
                type="submit"
                class="w-full py-4 rounded-2xl font-bold text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:scale-[1.02] transition duration-300 shadow-2xl"
            >
                Login to Dashboard
            </button>

        </form>

      

    </div>

</body>
</html>
